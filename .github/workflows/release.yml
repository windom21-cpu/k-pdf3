# Cross-platform release builder — fires on tag push (v*).
#
# Each runner builds installers for its native OS via electron-builder.
# Outputs land in `release/` (per the package.json `directories.output`
# setting). Electron-builder publishes the installer + `latest*.yml` +
# blockmap to the **public** `windom21-cpu/k-pdf3-releases` repository,
# which serves as the autoUpdater feed (§17.15). The development repo
# (this one, k-pdf3) stays private.
#
# Token: `RELEASES_REPO_TOKEN` is a fine-grained PAT scoped only to
# k-pdf3-releases (Contents=Write, Metadata=Read). The default
# GITHUB_TOKEN cannot write to a different repository, so the explicit
# secret is required. Without it electron-builder errors out clearly.
#
# Code-sign / notarization secrets stay out of scope — unsigned builds
# are still installable (right-click → 開く on macOS, SmartScreen
# warning on Windows). macOS auto-update will not work until certs are
# in place; Linux/Windows updates work fine unsigned.

name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build + publish (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: npm run publish:linux

      - name: Build + publish (macOS)
        if: runner.os == 'macOS'
        env:
          # Code signing / notarization requires APPLE_ID / APPLE_ID_PASSWORD
          # secrets — left disabled until certs are available. Unsigned
          # dmg still installable with right-click → 開く.
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: npm run publish:mac

      - name: Build + publish (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: npm run publish:win

      # Retain artifacts on the workflow run too — helpful when debugging
      # a failed publish without crossing into the public releases repo.
      - name: Upload artifacts (debugging copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k-pdf3-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 14
