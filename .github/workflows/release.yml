# Cross-platform release builder — fires on tag push (v*).
#
# Each runner builds installers for its native OS via electron-builder.
# Outputs land in `release/` (per the package.json `directories.output`
# setting). After all three matrix jobs complete, the `publish` job
# downloads every artifact and attaches them to the corresponding
# GitHub Release. Code-sign / notarization secrets stay out of scope —
# unsigned builds are still installable (right-click → 開く on macOS,
# SmartScreen warning on Windows).

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required by softprops/action-gh-release

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run build:icon

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npm run build:linux

      - name: Build (macOS)
        if: runner.os == 'macOS'
        # Code signing / notarization requires APPLE_ID / APPLE_ID_PASSWORD
        # secrets — left disabled until certs are available. Unsigned
        # dmg still installable with right-click → 開く.
        run: npm run build:mac

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k-pdf3-${{ matrix.os }}
          # electron-builder's output dir is "release" per package.json
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.zip
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la release-artifacts

      - name: Create / update GitHub Release with installers
        uses: softprops/action-gh-release@v2
        with:
          # `prerelease` heuristic — anything with `alpha` / `beta` / `rc`
          # in the tag name is treated as a pre-release; tags like v2.0.0
          # become full releases.
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.dmg
            release-artifacts/*.exe
            release-artifacts/*.zip
