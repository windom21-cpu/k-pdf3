# CI test workflow — runs on every push / PR.
#
# Cross-platform matrix because better-sqlite3 / mupdf are native deps
# and the test:m1 suite spawns a real Electron main process to exercise
# them. Linux uses xvfb-run because GitHub Actions runners are headless.

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # アクションは commit SHA で固定 (release.yml の「アクションの固定
      # 方針」コメント参照)。Node 24 ランタイム対応の最新メジャー。
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.22.2"
          # test は明示的に npm キャッシュ ON のまま (push/PR は頻度が
          # 低く storage 枠を圧迫しない。release のみ無効化している)。
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Linux Electron needs a virtual X server to start at all.
      - name: Run tests (Linux, xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libgbm1 libasound2t64 libgtk-3-0
          xvfb-run --auto-servernum npm test

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test
