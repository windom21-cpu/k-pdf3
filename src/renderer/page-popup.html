<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>K-PDF3 ポップアップ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./vendor/favicon-32.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #404040;
      font-family: "MS UI Gothic", sans-serif;
      overflow: hidden;
      user-select: none;
    }
    /* Thin top bar with drag region + small controls. Doubles as
     * the only way to move the frame:false window. */
    .popup-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 22px;
      background: #c0c0c0;
      border-bottom: 1px solid #808080;
      display: flex;
      align-items: center;
      padding: 0 4px;
      gap: 4px;
      -webkit-app-region: drag;
      z-index: 10;
    }
    .popup-title {
      flex: 1 1 auto;
      font-size: 11px;
      color: #000;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .popup-bar button {
      -webkit-app-region: no-drag;
      width: 22px;
      height: 18px;
      min-width: 22px;
      min-height: 0;
      padding: 0;
      font-size: 11px;
      line-height: 1;
      cursor: default;
    }
    .popup-bar button.is-active {
      box-shadow:
        inset -1px -1px #fff,
        inset 1px 1px #0a0a0a,
        inset -2px -2px #dfdfdf,
        inset 2px 2px grey;
    }
    /* Page area — full window minus the bar. Image fits inside,
     * preserving aspect, with subtle drop shadow so the paper edge
     * is visible against the dark backdrop. */
    .popup-stage {
      position: absolute;
      top: 22px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .popup-stage img {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
      background: #fff;
      object-fit: contain;
    }
  </style>
  <link rel="stylesheet" href="./vendor/98.css" />
</head>
<body>
  <div class="popup-bar">
    <span class="popup-title" id="popup-title">K-PDF3 ポップアップ</span>
    <button id="popup-pin" title="常に前面 (Always on Top)">📌</button>
    <button id="popup-close" title="閉じる (Esc)">×</button>
  </div>
  <div class="popup-stage">
    <img id="popup-image" alt="" />
  </div>
  <script type="module" src="./page-popup.js"></script>
</body>
</html>
