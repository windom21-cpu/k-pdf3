<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-PDF3 v2.0.0 (M2)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="title-bar">
    <span class="title-bar-text">K-PDF3 — 法律実務向け PDF Workspace</span>
    <span id="appinfo" class="appinfo"></span>
  </header>
  <nav class="toolbar">
    <button id="btn-new">新規 + PDF 取込</button>
    <button id="btn-open">既存を開く</button>
    <button id="btn-close" disabled>閉じる</button>
    <span class="ws-label" id="ws-label"></span>
    <span class="ws-status" id="ws-status">(no workspace)</span>
  </nav>
  <main id="viewer-container" class="viewer-container">
    <!-- Page DOM is built dynamically by viewer.js -->
  </main>
  <script type="module" src="./renderer.js"></script>
</body>
</html>
